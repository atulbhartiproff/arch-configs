##########################################################################
# THEME
##########################################################################

# Gruvbox-ish custom colors

# Selection Colors
selection_foreground     #ebdbb2
selection_background     #d65d0e

# Window Border Colors
active_border_color      #8ec07c
inactive_border_color    #665c54

# Tabs
active_tab_foreground    #ebdbb2
active_tab_background    #458588
inactive_tab_foreground  #ebdbb2
inactive_tab_background  #504945

# Basic colors
background               #000000
foreground               #ebdbb2

# 16 colors
color0                   #3c3836
color1                   #cc241d
color2                   #98971a
color3                   #d79921
color4                   #458588
color5                   #b16286
color6                   #689d6a
color7                   #a89984
color8                   #928374
color9                   #fb4934
color10                  #b8bb26
color11                  #fabd2f
color12                  #83a598
color13                  #d3869b
color14                  #8ec07c
color15                  #fbf1c7

# Cursor
cursor                   #bdae93
cursor_text_color        #665c54

# URL
url_color                #458588

##########################################################################
# TERMINAL
##########################################################################

term xterm-kitty
enable_audio_bell no
linux_display_server x11

##########################################################################
# APPEARANCE
##########################################################################

background_opacity 1.0
# background_blur 1   # uncomment only if using Wayland

font_family        SauceCodePro Nerd Font
bold_font          auto
italic_font        auto
bold_italic_font   auto
font_size 12.0

##########################################################################
# CURSOR
##########################################################################

cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 0

##########################################################################
# SCROLLING / MOUSE
##########################################################################

scrollback_lines 5000
wheel_scroll_multiplier 3.0
mouse_hide_wait -1

##########################################################################
# WINDOW
##########################################################################

remember_window_size no

initial_window_width 1200
initial_window_height 750

window_border_width 1.5pt
window_padding_width 0
window_margin_width 2

hide_window_decorations no

##########################################################################
# LAYOUTS
##########################################################################

enabled_layouts tall,stack

##########################################################################
# TAB BAR
##########################################################################

tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge bottom
tab_bar_align left

active_tab_font_style   bold
inactive_tab_font_style normal

##########################################################################
# KEYBINDS
##########################################################################

# Font size reset
map ctrl+shift+backspace change_font_size all 0

# Window management
map ctrl+shift+enter new_window
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window

# Layout management
map ctrl+shift+l next_layout
map ctrl+alt+r goto_layout tall
map ctrl+alt+s goto_layout stack

# Tabs
map ctrl+shift+t new_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+q close_tab
